<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store - Apple</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="src/store.css">
</head>

<body id="store-body">

    <!-- Navbar (Light variation for Store) -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top apple-nav-light">
        <div class="container-fluid px-4 px-md-5">
            <a class="navbar-brand nav-icon" href="index.html"><i class="fa-brands fa-apple"></i></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarSupportedContent">
                <ul class="navbar-nav mb-2 mb-lg-0 gap-4">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="store.html">Store</a></li>
                    <li class="nav-item"><a class="nav-link" href="mac.html">Mac</a></li>
                    <li class="nav-item"><a class="nav-link" href="ipad.html">iPad</a></li>
                    <li class="nav-item"><a class="nav-link" href="iphone.html">iPhone</a></li>
                    <li class="nav-item"><a class="nav-link" href="watch.html">Watch</a></li>
                    <li class="nav-item"><a class="nav-link" href="airpods.html">AirPods</a></li>
                </ul>
            </div>

            <div class="d-none d-lg-flex align-items-center gap-4">
                <a href="#" class="text-dark nav-icon"><i class="bi bi-search"></i></a>
                <a href="#" class="text-dark nav-icon"><i class="bi bi-bag"></i></a>
            </div>
        </div>
    </nav>

    <!-- Main Store Structure -->
    <main id="smooth-wrapper">

        <!-- Store Header & Search -->
        <section class="store-header">
            <div class="container px-4 px-md-5">
                <div class="row align-items-end">
                    <div class="col-md-7 header-text-col">
                        <h1 class="store-title reveal-elem">Store.</h1>
                        <h2 class="store-subtitle reveal-elem">
                            The best way to buy the<br>products you love.
                        </h2>
                    </div>
                    <!-- Search Component -->
                    <div class="col-md-5 search-col reveal-elem">
                        <div class="search-container">
                            <i class="bi bi-search search-icon"></i>
                            <input type="text" id="productSearch" class="form-control"
                                placeholder="Search products, categories...">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Product Grid Section -->
        <section class="product-section">
            <div class="container px-4 px-md-5">
                <!-- No Results Message -->
                <div id="noResultsMsg" class="d-none text-center py-5">
                    <h3 class="fw-bold">No results found</h3>
                    <p class="text-muted">Try searching for something else like "Pro" or "Air".</p>
                </div>

                <!-- Dynamic Grid -->
                <div id="productGrid" class="product-grid">
                    <!-- Javascript will render cards here -->
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="src/store.js"></script>

</body>

</html>
